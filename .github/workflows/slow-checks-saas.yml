name: Slow-Checks-SaaS

on:
  workflow_call:

jobs:

  Tests:
    name: SaaS-Integration-Tests (Python-3.12)
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: SCM Checkout
        uses: actions/checkout@v5

      - name: Setup Python & Poetry Environment
        uses: exasol/python-toolbox/.github/actions/python-environment@v4
        with:
          python-version: "3.12"

      - name: Run Tests and Collect Coverage
        env:
          SAAS_HOST: ${{ secrets.INTEGRATION_TEAM_SAAS_STAGING_HOST }}
          SAAS_ACCOUNT_ID: ${{ secrets.INTEGRATION_TEAM_SAAS_STAGING_ACCOUNT_ID }}
          SAAS_PAT: ${{ secrets.INTEGRATION_TEAM_SAAS_STAGING_PAT }}
        run: poetry run -- nox -s test:integration -- -s --coverage --backend=saas

      - name: Upload Artifacts
        uses: actions/upload-artifact@v5
        with:
          name: coverage-python3.12-saas
          path: .coverage
          include-hidden-files: true
